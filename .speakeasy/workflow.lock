    speakeasyVersion: latest
    sources:
        openapi:
            inputs:
                - location: https://gr4vy.github.io/openapi/core/openapi.json
            overlays:
                - location: ./.speakeasy/overlays/servers.yaml
                - location: ./.speakeasy/overlays/security.yaml
